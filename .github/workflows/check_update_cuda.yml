name: check_update_cuda

on:
  workflow_call:
    secrets:
      CACHE_NAME:
        required: true
    outputs:
      should_test:
        value: ${{ jobs.check_update_cuda.outputs.should_test }}
      should_update:
        value: ${{ jobs.check_update_cuda.outputs.should_update }}

jobs:
  check_update_cuda:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    env:
      DOCKER_USER: ${{ github.repository_owner }}
    outputs:
      should_test: ${{ steps.check.outputs.should_test }}
      should_update: ${{ steps.check.outputs.should_update }}
    steps:
      - name: Cache
        uses: actions/cache@v6
        with:
          path: |
            ${{ runner.temp }}/.buildx-bin
            ${{ runner.temp }}/.buildx-cache-cuda
          key: ${{ secrets.CACHE_NAME }}-cuda-${{ github.sha }}-${{ github.run_id }}-check
          restore-keys: |
            ${{ secrets.CACHE_NAME }}-cuda-
      - name: Prepare
        run: |
          docker pull nvidia/cuda:12.9.1-cudnn-runtime-ubuntu24.04
          docker pull "$DOCKER_USER/whisper-server:cuda" || true
      - name: Check
        id: check
        run: |
          BASE_UPDATED=false

          base_ts=$(docker inspect --format='{{.Created}}' nvidia/cuda:12.9.1-cudnn-runtime-ubuntu24.04)
          image_ts=$(docker inspect --format='{{.Created}}' "$DOCKER_USER/whisper-server:cuda" 2>/dev/null || true)

          if [ -n "$base_ts" ] && [ -n "$image_ts" ]; then
            base_ts_s=$(date -d "$base_ts" +%s)
            image_ts_s=$(date -d "$image_ts" +%s)
            ts_now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            ts_now_s=$(date -d "$ts_now" +%s)
            diff_s=$((ts_now_s - base_ts_s))
            diff=$(printf '%dd %dh:%dm:%ds\n' $((diff_s/86400)) $((diff_s%86400/3600)) $((diff_s%3600/60)) $((diff_s%60)))

            echo "Base update time:  $base_ts"
            echo "Image update time: $image_ts"
            echo "Current time:      $ts_now"
            echo "Time diff (cur-base): $diff (${diff_s}s)"

            if [ -n "$base_ts_s" ] && [ -n "$image_ts_s" ] \
              && [ "$base_ts_s" -ge "$image_ts_s" ] \
              && [ "$diff_s" -ge 14400 ]; then
              echo "Starting build..."
              BASE_UPDATED=true
            else
              echo "Not starting build."
            fi
          elif [ -n "$base_ts" ] && [ -z "$image_ts" ]; then
            echo "CUDA image not found. Starting initial build..."
            BASE_UPDATED=true
          fi
          echo "should_test=${BASE_UPDATED}" >> "$GITHUB_OUTPUT"
          echo "should_update=${BASE_UPDATED}" >> "$GITHUB_OUTPUT"